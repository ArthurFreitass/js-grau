<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo da Forca</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 Jogo da Forca</h1>

<div class="container">

<div id="forca">
<pre id="desenho"></pre>
</div>

<h2 id="palavra-secreta">_ _ _ _</h2>

<div class="entrada">
<input type="text" id="letra" maxlength="1" placeholder="Digite uma letra">
<button onclick="verificarLetra()">Tentar</button>
</div>

<p>❌ Letras erradas: <span id="letras-erradas"></span></p>

<p>❤️ Tentativas restantes: <span id="tentativas"></span></p>

<h3 id="mensagem"></h3>

<button onclick="novoJogo()" class="novo">Novo Jogo</button>

</div>

<script src="script.js"></script>

</body>
</html>
